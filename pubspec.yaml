name: urbanthread
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  # Range, not a pin: riverpod_annotation 4.0.2 depends on an exact riverpod
  # version, so the solver has to be free to pick the flutter_riverpod release
  # that agrees with it.
  flutter_riverpod: ^3.0.0
  # Pinned to 4.0.2, not ^4.0.3, and the difference matters. riverpod_generator
  # 4.0.3 depends on riverpod_annotation *exactly* 4.0.2, so requiring ^4.0.3
  # forces the solver onto generator 4.0.4-dev, which needs analyzer ^12 →
  # meta ^1.18 — and the Flutter SDK pins meta itself. On an SDK shipping
  # meta 1.17.0 that is unsolvable.
  riverpod_annotation: 4.0.2
  go_router: ^17.3.0
  dio: ^5.10.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.9.2
  freezed_annotation: ^3.1.0
  # Held at 4.11.x to match json_serializable 6.13.0, which is itself the last
  # release on analyzer 9 — see the dev_dependencies note.
  json_annotation: ^4.11.0
  equatable: ^2.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  cached_network_image: ^3.4.1
  internet_connection_checker_plus: ^3.1.1
  flutter_dotenv: ^6.0.1
  logger: ^2.7.0
  flutter_svg: ^2.3.0
  image_picker: ^1.2.3
  permission_handler: ^12.0.3
  intl: ^0.20.3
  connectivity_plus: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── These versions are load-bearing. Read before "upgrading". ───────────
  #
  # The Flutter SDK pins `meta` itself — 1.17.0 on Flutter 3.41. Every code
  # generator here depends on `analyzer`, and `analyzer >=10.0.2` requires
  # `meta ^1.18`, which the SDK's pin forbids. So the whole generator set has
  # to stay on **analyzer 9.x**, and these are the last releases that do:
  #
  #   json_serializable  6.13.1+ → analyzer >=10   (hence json_annotation 4.11)
  #   hive_ce_generator  1.11.1+ → analyzer ^10/^12
  #   riverpod_generator 4.0.4+  → analyzer ^12
  #   flutter_native_splash 2.4.8+ → meta ^1.18 directly
  #
  # Exact pins where a caret would drift across those lines. Leaving any of
  # them unconstrained makes pub explore the analyzer-12 releases and report
  # the conflict as a several-hundred-line unsolvable graph rather than as
  # the one-line incompatibility it actually is.
  #
  # Verified against Flutter 3.41.1 / Dart 3.11.0. On a newer SDK (3.44+,
  # which ships meta 1.18) this set still resolves, but you can then move the
  # whole generator set forward with `flutter pub upgrade --major-versions`.
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.5
  json_serializable: 6.13.0
  retrofit_generator: ^10.2.7
  riverpod_generator: 4.0.3
  hive_ce_generator: 1.11.0
  # 2.4.8 moved to meta ^1.18; 2.4.7 is the last release the SDK's pin allows.
  flutter_native_splash: '>=2.4.5 <2.4.8'
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Read by flutter_dotenv at startup. Listed as a file rather than a
    # directory so a stray local file cannot ship in a release build.
    - .env
    - assets/images/
    - assets/icons/

  # Bundled rather than fetched at runtime: the app must render correctly
  # offline, and a font arriving on second launch would reflow the catalogue.
  # Both are variable fonts, so one file covers every weight the design uses.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
